spring:
  application:
    name: spring-erp-platform

  # Configuration de la base de données
  datasource:
    url: jdbc:postgresql://localhost:5432/erp_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # Configuration JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # Configuration Flyway pour les migrations
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

# Paramètres personnalisés pour le JWT (utilisés par ton JwtService)
app:
  jwt:
    # Cette clé doit faire au moins 256 bits (32 caractères)
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    # Expiration : 86400000 ms = 24 heures
    expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info