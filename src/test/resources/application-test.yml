spring:
  # 1. Utilisation de H2 en mode compatibilité PostgreSQL
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # 2. Configuration JPA stricte pour les tests
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      # Crée le schéma à partir des entités et le détruit après le test
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # Désactive la recherche de métadonnées JDBC Postgres pour éviter les erreurs de connexion
        temp:
          use_jdbc_metadata_defaults: false

  # 3. Désactivation de Flyway en test pour gagner en rapidité
  # Les tables sont créées via hibernate.ddl-auto: create-drop
  flyway:
    enabled: false

# 4. Configuration JWT spécifique à l'environnement de test
app:
  jwt:
    # Secret statique pour les tests (différent de la prod)
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration: 86400000

# 5. Désactivation des logs trop verbeux pour garder une console CI/CD propre
logging:
  level:
    root: INFO
    com.amine.spring_erp_platform: DEBUG
    org.hibernate.SQL: DEBUG